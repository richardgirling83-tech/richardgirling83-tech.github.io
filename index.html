<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richard Girling, Ph.D. | Candidate for Head of Communications</title>
    <style>
        :root {
            --dca-blue: #0091ff;
            --dca-dark-blue: #0066cc;
            --dca-yellow: #f5b000;
            --text-dark: #2d3142;
            --text-light: #4f5d75;
            --bg-light: #f8f9fa;
            --border-color: #e6e8ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* Top Header Navigation */
        header {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container img {
            height: 45px;
            display: block;
        }

        .header-title {
            text-align: right;
        }

        .header-title h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--dca-blue);
            font-weight: 600;
        }

        /* Hero Banner Section */
        .hero-section {
            background: linear-gradient(135deg, #ffffff 0%, #e6f4ff 100%);
            padding: 60px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 40px;
        }

        .hero-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .hero-content h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .hero-tagline {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 400;
            border-left: 4px solid var(--dca-blue);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        /* Main Grid Content */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* Main Content Blocks */
        .matrix-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .matrix-card h3 {
            font-size: 1.4rem;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-light);
        }

        .matrix-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .matrix-row:last-child {
            border-bottom: none;
        }

        .req-side h4 {
            color: var(--dca-dark-blue);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .badge {
            background-color: #f0f4f8;
            color: var(--text-light);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .res-side ul {
            list-style-type: none;
        }

        .res-side li {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 8px;
            position: relative;
            padding-left: 15px;
        }

        .res-side li::before {
            content: "•";
            color: var(--dca-blue);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* Case Studies Styling */
        .case-study-block {
            background: #fafbfc;
            border-left: 4px solid var(--dca-blue);
            padding: 20px;
            margin-top: 15px;
            border-radius: 0 8px 8px 0;
        }

        .case-study-title {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        /* Sidebar Sidebar Layout */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: sticky;
            top: 110px;
        }

        .sidebar-widget {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .sidebar-widget h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .summary-list {
            list-style: none;
        }

        .summary-list li {
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-light);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .summary-list li::before {
            content: "✓";
            color: var(--dca-blue);
            font-weight: bold;
        }
