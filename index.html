<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richard Girling, Ph.D. | Candidate for Head of Communications</title>
    <style>
        :root {
            --dca-blue: #0091ff;
            --dca-dark-blue: #0066cc;
            --dca-yellow: #f5b000;
            --text-dark: #2d3142;
            --text-light: #4f5d75;
            --bg-light: #f8f9fa;
            --border-color: #e6e8ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* Top Header Navigation */
        header {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container img {
            height: 45px;
            display: block;
        }

        .header-title {
            text-align: right;
        }

        .header-title h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--dca-blue);
            font-weight: 600;
        }

        /* Hero Banner Section */
        .hero-section {
            background: linear-gradient(135deg, #ffffff 0%, #e6f4ff 100%);
            padding: 60px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 40px;
        }

        .hero-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .hero-content h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .hero-tagline {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 400;
            border-left: 4px solid var(--dca-blue);
